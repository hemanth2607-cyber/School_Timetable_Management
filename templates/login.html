<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Login | School Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 flex items-center justify-center min-h-screen px-4 sm:px-6 lg:px-8">
    <div class="bg-slate-900 p-6 sm:p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-800">
        <div class="text-center mb-8">
            <span class="text-xs uppercase font-extrabold tracking-widest text-sky-400 bg-sky-950/50 px-3 py-1 rounded-full border border-sky-800/30">
                Authorized Access Only
            </span>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-white mt-4 tracking-tight">Institutional Portal</h1>
            <p class="text-slate-400 text-xs sm:text-sm mt-1">AI Timetable & Administrative Suite</p>
        </div>
        
        <!-- Flash Alert Messages Container -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, msg in messages %}
              <div class="mb-5 p-3.5 rounded-lg text-xs sm:text-sm border {% if category == 'danger' %} bg-red-950/40 border-red-500/30 text-red-200 {% else %} bg-sky-950/40 border-sky-500/30 text-sky-200 {% endif %}">
                {{ msg }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-slate-300 text-xs sm:text-sm font-semibold mb-1.5">Portal Scope (Affiliation)</label>
                <select name="school_id" class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/45 focus:border-sky-500">
                    <option value="global">Global Portal (Owner & Moderators)</option>
                    {% for sch in schools %}
                    <option value="{{ sch.id }}">{{ sch.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-slate-300 text-xs sm:text-sm font-semibold mb-1.5">Username</label>
                <input type="text" name="username" required autocomplete="username"
                       class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/45 focus:border-sky-500 transition-all">
            </div>
            <div>
                <label class="block text-slate-300 text-xs sm:text-sm font-semibold mb-1.5">Password</label>
                <input type="password" name="password" required autocomplete="current-password"
                       class="w-full px-3.5 py-2.5 bg-slate-800 border border-slate-700 rounded-lg text-white text-sm focus:outline-none focus:ring-2 focus:ring-sky-500/45 focus:border-sky-500 transition-all">
            </div>
            <button type="submit" class="w-full py-3 bg-sky-600 hover:bg-sky-500 active:bg-sky-700 text-white font-bold rounded-lg transition-colors uppercase tracking-wider text-xs sm:text-sm shadow-lg shadow-sky-600/10 mt-2">
                Authenticate
            </button>
        </form>
    </div>
</body>
</html>
